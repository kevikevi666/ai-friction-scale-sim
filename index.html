<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI Agency Spectrum</title>
<meta name="description" content="Tools for thinking about AI and agency in learning. Built by Kevin Farrant." />
<meta property="og:title" content="AI Agency Spectrum" />
<meta property="og:description" content="Tools for thinking about AI and agency in learning." />
<meta property="og:url" content="https://aiagencyspectrum.com" />
<meta property="og:type" content="website" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="color-scheme" content="light dark">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="icon" href="/favicon.png" type="image/png" sizes="48x48" />
<link rel="icon" href="/favicon.svg" sizes="any" type="image/svg+xml" />
<link rel="apple-touch-icon" href="/favicon.png" />
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,600;0,700;1,400;1,700&family=JetBrains+Mono:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin="anonymous" defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin="anonymous" defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js" crossorigin="anonymous" defer></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { overflow-x: hidden; -webkit-text-size-adjust: 100%; }
  body { font-family: 'Crimson Pro', Georgia, serif; transition: background 0.4s, color 0.4s; }
  button { font-family: inherit; }
  @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; } }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const mono = "'JetBrains Mono', monospace";
const spc  = "'Space Mono', monospace";
const serif = "'Crimson Pro', Georgia, serif";

function useIsMobile(bp = 768) {
  const [m, setM] = useState(() => window.matchMedia(`(max-width: ${bp - 1}px)`).matches);
  useEffect(() => {
    const mql = window.matchMedia(`(max-width: ${bp - 1}px)`);
    const h = e => setM(e.matches);
    mql.addEventListener("change", h);
    return () => mql.removeEventListener("change", h);
  }, []);
  return m;
}

function useTheme(dark) {
  return {
    bg:          dark ? "#0a0a0f"                    : "#f5f5f0",
    text:        dark ? "#ffffff"                    : "#1a1a2e",
    textHigh:    dark ? "rgba(255,255,255,0.65)"     : "rgba(0,0,0,0.6)",
    textMid:     dark ? "rgba(255,255,255,0.55)"     : "rgba(0,0,0,0.55)",
    textLow:     dark ? "rgba(255,255,255,0.4)"      : "rgba(0,0,0,0.4)",
    cardBg:      dark ? "rgba(255,255,255,0.025)"    : "rgba(255,255,255,0.75)",
    cardBorder:  dark ? "rgba(255,255,255,0.07)"     : "rgba(0,0,0,0.09)",
    cardShadow:  dark ? "none"                       : "0 2px 12px rgba(0,0,0,0.06)",
    divider:     dark ? "rgba(255,255,255,0.06)"     : "rgba(0,0,0,0.07)",
    btnHover:    dark ? "rgba(255,255,255,0.04)"     : "rgba(0,0,0,0.04)",
  };
}

const TOOLS = [
  {
    id: "agency",
    emoji: "🤖",
    title: "The Agency Spectrum",
    subtitle: "Three roles in AI work",
    description: "Author, Designer, Conductor. A framework for understanding where you sit when AI is in the room.",
    author: "Kevin Farrant",
    accent: { dark: "#2A9D8F", light: "#00796B" },
    href: "/agency",
  },
  {
    id: "friction",
    emoji: "🧠",
    title: "AI Friction Scale",
    subtitle: "Interactive simulation",
    description: "Explore how different levels of AI involvement affect learning, retention, and cognitive demand.",
    author: "AI Friction Scale",
    accent: { dark: "#F4A261", light: "#E65100" },
    href: "/pages/friction-scale.html",
  },
  {
    id: "assessment",
    emoji: "🎯",
    title: "Assessment Check",
    subtitle: "Student self-check tool",
    description: "Can you stand behind your work? A five-question reflection on understanding and ownership.",
    author: "Kevin Farrant",
    accent: { dark: "#818cf8", light: "#6366f1" },
    href: "/pages/assessment.html",
  },
];

function ThemeToggle({ dark, onToggle, t }) {
  return React.createElement("button", {
    onClick: onToggle,
    title: dark ? "Switch to light mode" : "Switch to dark mode",
    style: {
      background: "transparent",
      border: `1px solid ${t.cardBorder}`,
      borderRadius: 8,
      cursor: "pointer",
      padding: "6px 10px",
      fontSize: 16,
      color: t.textMid,
      transition: "border-color 0.2s",
    },
  }, dark ? "☀️" : "🌙");
}

function ToolCard({ tool, dark, t, isMobile }) {
  const [hovered, setHovered] = useState(false);
  const accent = dark ? tool.accent.dark : tool.accent.light;

  return React.createElement("a", {
    href: tool.href,
    onMouseEnter: () => setHovered(true),
    onMouseLeave: () => setHovered(false),
    style: {
      display: "flex",
      flexDirection: "column",
      gap: 0,
      background: t.cardBg,
      border: `1px solid ${hovered ? accent : t.cardBorder}`,
      borderRadius: 16,
      padding: isMobile ? "28px 24px" : "32px 28px",
      boxShadow: hovered
        ? `0 0 0 1px ${accent}40, ${t.cardShadow}`
        : t.cardShadow,
      textDecoration: "none",
      cursor: "pointer",
      transition: "border-color 0.2s, box-shadow 0.2s, transform 0.18s",
      transform: hovered ? "translateY(-3px)" : "translateY(0)",
      flex: 1,
      minWidth: isMobile ? "100%" : 260,
      maxWidth: isMobile ? "100%" : 340,
    },
  },
    // Emoji
    React.createElement("div", {
      style: { fontSize: 36, marginBottom: 16, lineHeight: 1 }
    }, tool.emoji),

    // Title
    React.createElement("div", {
      style: {
        fontFamily: spc,
        fontSize: 13,
        fontWeight: 700,
        color: accent,
        letterSpacing: "0.04em",
        textTransform: "uppercase",
        marginBottom: 4,
      }
    }, tool.title),

    // Subtitle
    React.createElement("div", {
      style: {
        fontFamily: mono,
        fontSize: 11,
        color: t.textLow,
        marginBottom: 16,
        letterSpacing: "0.02em",
      }
    }, tool.subtitle),

    // Divider
    React.createElement("div", {
      style: {
        height: 1,
        background: t.divider,
        marginBottom: 16,
      }
    }),

    // Description
    React.createElement("p", {
      style: {
        fontFamily: serif,
        fontSize: 16,
        lineHeight: 1.55,
        color: t.textHigh,
        marginBottom: 20,
        flex: 1,
      }
    }, tool.description),

    // Footer row
    React.createElement("div", {
      style: {
        display: "flex",
        justifyContent: "flex-end",
        alignItems: "center",
      }
    },
      React.createElement("span", {
        style: {
          fontFamily: mono,
          fontSize: 11,
          color: accent,
          letterSpacing: "0.04em",
          transition: "opacity 0.15s",
          opacity: hovered ? 1 : 0.6,
        }
      }, "Open →"),
    ),
  );
}

function App() {
  const [dark, setDark] = useState(false);
  const isMobile = useIsMobile();
  const t = useTheme(dark);

  useEffect(() => {
    document.body.style.background = t.bg;
    document.body.style.color = t.text;
  }, [dark, t.bg, t.text]);

  return React.createElement("div", {
    style: {
      minHeight: "100vh",
      display: "flex",
      flexDirection: "column",
      background: t.bg,
      color: t.text,
    },
  },
    // Header
    React.createElement("header", {
      style: {
        display: "flex",
        justifyContent: "space-between",
        alignItems: "center",
        padding: isMobile ? "20px 20px" : "24px 40px",
        borderBottom: `1px solid ${t.divider}`,
      },
    },
      React.createElement("div", {
        style: {
          fontFamily: spc,
          fontSize: isMobile ? 11 : 12,
          fontWeight: 700,
          color: t.textMid,
          letterSpacing: "0.06em",
          textTransform: "uppercase",
        }
      }, "AI Teacher Toolkit"),
      React.createElement(ThemeToggle, { dark, onToggle: () => setDark(d => !d), t }),
    ),

    // Main
    React.createElement("main", {
      style: {
        flex: 1,
        display: "flex",
        flexDirection: "column",
        alignItems: "center",
        justifyContent: "center",
        padding: isMobile ? "48px 20px 40px" : "72px 40px 60px",
        gap: 0,
      },
    },
      // Headline
      React.createElement("h1", {
        style: {
          fontFamily: serif,
          fontSize: isMobile ? 32 : 44,
          fontWeight: 300,
          lineHeight: 1.2,
          color: t.text,
          textAlign: "center",
          maxWidth: 560,
          marginBottom: 16,
          letterSpacing: "-0.01em",
        }
      }, "Tools for thinking about AI and student agency in learning"),

      // Subline
      React.createElement("p", {
        style: {
          fontFamily: mono,
          fontSize: isMobile ? 12 : 13,
          color: t.textLow,
          textAlign: "center",
          maxWidth: 480,
          lineHeight: 1.6,
          marginBottom: isMobile ? 40 : 56,
          letterSpacing: "0.02em",
          whiteSpace: isMobile ? "normal" : "nowrap",
        }
      }, "Three interactive tools for teachers and students"),

      // Cards
      React.createElement("div", {
        style: {
          display: "flex",
          flexDirection: isMobile ? "column" : "row",
          gap: 16,
          width: "100%",
          maxWidth: 1040,
          alignItems: isMobile ? "stretch" : "flex-start",
          justifyContent: "center",
        }
      },
        ...TOOLS.map(tool =>
          React.createElement(ToolCard, { key: tool.id, tool, dark, t, isMobile })
        ),
      ),
    ),

    // Footer
    React.createElement("footer", {
      style: {
        borderTop: `1px solid ${t.divider}`,
        padding: isMobile ? "20px" : "24px 40px",
        display: "flex",
        justifyContent: "space-between",
        alignItems: "center",
        flexWrap: "wrap",
        gap: 8,
      },
    },
      React.createElement("span", {
        style: { fontFamily: mono, fontSize: 10, color: t.textLow, letterSpacing: "0.04em" }
      }, "Kevin Farrant — AI Teacher Toolkit"),
      React.createElement("a", {
        href: "mailto:kevinfarrant@gmail.com",
        style: { fontFamily: mono, fontSize: 10, color: t.textLow, letterSpacing: "0.04em", textDecoration: "none" }
      }, "Contact"),
    ),
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
</script>
</body>
</html>
