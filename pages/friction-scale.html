/* ───────── responsive hook ───────── */
function useIsMobile(bp = 768) {
  const query = `(max-width: ${bp - 1}px)`;
  const [m, setM] = useState(() => window.matchMedia(query).matches);
  useEffect(() => {
    const mql = window.matchMedia(query);
    const h = (e) => setM(e.matches);
    mql.addEventListener("change", h);
    return () => mql.removeEventListener("change", h);
  }, [query]);
  return m;
}

/* ───────── continuous interpolation ───────── */
function interpolateAtFriction(friction, levels) {
  // friction is 0-100, levels are sorted by friction descending (100, 75, 50, 25, 0)
  // Clamp
  const f = Math.max(0, Math.min(100, friction));

  // Find bracketing levels
  let lo = levels[levels.length - 1], hi = levels[0];
  for (let i = 0; i < levels.length - 1; i++) {
    if (f <= levels[i].friction && f >= levels[i + 1].friction) {
      hi = levels[i]; lo = levels[i + 1]; break;
    }
  }

  // Exact match on a level
  const exact = levels.find(l => l.friction === f);
  if (exact) return { ...exact, isExact: true, nearestIndex: levels.indexOf(exact), zone: null };

  // Interpolation factor (0 = lo, 1 = hi)
  const range = hi.friction - lo.friction;
  const frac = range === 0 ? 0 : (f - lo.friction) / range;

  const lerp = (a, b) => Math.round(a + (b - a) * frac);
  const parseHex = (hex) => [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
  const lerpColor = (c1, c2) => {
    const a = parseHex(c1), b = parseHex(c2);
    const r = a.map((v, i) => Math.round(v + (b[i] - v) * frac));
    return `#${r.map(v => v.toString(16).padStart(2,"0")).join("")}`;
  };

  // Find transition copy
  const trans = TRANSITIONS.find(t => t.from === hi.id && t.to === lo.id);
  const nearestIdx = frac >= 0.5 ? levels.indexOf(hi) : levels.indexOf(lo);

  return {
    id: frac >= 0.5 ? hi.id : lo.id,
    name: frac >= 0.5 ? hi.name : lo.name,
    subtitle: frac >= 0.5 ? hi.subtitle : lo.subtitle,
    icon: frac >= 0.5 ? hi.icon : lo.icon,
    friction: f,
    color: lerpColor(lo.color || "#888", hi.color || "#888"),
    glow: lerpColor(lo.glow || "#888", hi.glow || "#888"),
    cognitiveDemand: lerp(lo.cognitiveDemand, hi.cognitiveDemand),
    retention: lerp(lo.retention, hi.retention),
    authenticity: lerp(lo.authenticity, hi.authenticity),
    efficiency: lerp(lo.efficiency, hi.efficiency),
    description: trans ? trans.description : hi.description,
    studentBehavior: trans ? trans.studentBehavior : hi.studentBehavior,
    learningOutcome: trans ? trans.learningOutcome : hi.learningOutcome,
    isExact: false,
    nearestIndex: nearestIdx,
    zone: `Between ${hi.name} and ${lo.name}`,
  };
}

/* ───────── Toggle Switch ───────── */

/* ───────── Gauge (used in Compare tab) ───────── */
function FrictionGauge({ value, color, size = 200, t }) {
  const canvasRef = useRef(null);
  useEffect(() => {
    const canvas = canvasRef.current; if (!canvas) return;
    const ctx = canvas.getContext("2d"); const dpr = window.devicePixelRatio || 1;
    canvas.width = size * dpr; canvas.height = size * 0.65 * dpr;
    ctx.scale(dpr, dpr); canvas.style.width = size + "px"; canvas.style.height = size * 0.65 + "px";
    const cx = size / 2, cy = size * 0.55, r = size * 0.38;
    ctx.clearRect(0, 0, size, size * 0.65);
    ctx.beginPath(); ctx.arc(cx,cy,r,Math.PI,2*Math.PI); ctx.lineWidth = size*0.08; ctx.strokeStyle = t.gaugeTrack; ctx.lineCap = "round"; ctx.stroke();
    const grad = ctx.createLinearGradient(0,cy,size,cy);
    grad.addColorStop(0,t.gaugeGradient[0]); grad.addColorStop(0.25,t.gaugeGradient[1]); grad.addColorStop(0.5,t.gaugeGradient[2]); grad.addColorStop(0.75,t.gaugeGradient[3]); grad.addColorStop(1,t.gaugeGradient[4]);
    const p = value / 100;
    ctx.beginPath(); ctx.arc(cx,cy,r,Math.PI,Math.PI+p*Math.PI); ctx.lineWidth = size*0.08; ctx.strokeStyle = grad; ctx.lineCap = "round"; ctx.stroke();
    const na = Math.PI+p*Math.PI, nl = r*0.7;
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx+nl*Math.cos(na),cy+nl*Math.sin(na)); ctx.lineWidth = 3; ctx.strokeStyle = color; ctx.lineCap = "round"; ctx.stroke();
    ctx.beginPath(); ctx.arc(cx,cy,6,0,2*Math.PI); ctx.fillStyle = color; ctx.fill();
  }, [value, color, size, t]);
  return React.createElement("canvas", { ref: canvasRef });
}

/* ───────── Friction Slider ───────── */
function FrictionSlider({ frictionValue, onFrictionChange, levels, isMobile, t }) {
  const trackRef = useRef(null);
  const [dragging, setDragging] = useState(false);
  const [hoveredTick, setHoveredTick] = useState(null);
  const count = levels.length;
  const thumbSize = isMobile ? 32 : 36;
  const halfThumb = thumbSize / 2;

  // Slider left = friction 100 (NO AI), right = friction 0 (FULL AI)
  // Track percentage (0-100 left-to-right) maps to friction (100-0)
  const frictionToTrackPct = (f) => 100 - f;
  const levelTrackPct = (i) => frictionToTrackPct(levels[i].friction);

  const frictionFromPointer = (clientX) => {
    const rect = trackRef.current.getBoundingClientRect();
    const inner = rect.width - halfThumb * 2;
    const trackPct = Math.max(0, Math.min(100, ((clientX - rect.left - halfThumb) / inner) * 100));
    const raw = Math.round(100 - trackPct);
    // Magnetic snap: if within 5 points of a level, lock to it
    for (let i = 0; i < levels.length; i++) {
      if (Math.abs(raw - levels[i].friction) <= 5) return levels[i].friction;
    }
    return raw;
  };

  const handlePointerDown = (e) => {
    e.preventDefault();
    setDragging(true);
    onFrictionChange(frictionFromPointer(e.clientX));
    trackRef.current.setPointerCapture(e.pointerId);
  };
  const handlePointerMove = (e) => {
    if (!dragging) return;
    onFrictionChange(frictionFromPointer(e.clientX));
  };
  const handlePointerUp = () => setDragging(false);

  const interp = interpolateAtFriction(frictionValue, levels);
  const thumbTrackPct = frictionToTrackPct(frictionValue);

  return React.createElement("div", { style: { marginBottom: isMobile ? 18 : 32 } },
    // Level icon and name display
    React.createElement("div", { style: { textAlign: "center", marginBottom: isMobile ? 14 : 20 } },
      React.createElement("div", { style: { fontSize: isMobile ? 32 : 44, marginBottom: 4, transition: "transform 0.3s", transform: dragging ? "scale(1.1)" : "scale(1)" } }, interp.icon),
      React.createElement("div", { style: { fontSize: isMobile ? 16 : 20, fontWeight: 700, color: interp.color, fontFamily: mono, letterSpacing: "0.05em" } }, interp.name),
      React.createElement("div", { style: { fontSize: isMobile ? 11 : 13, color: t.textLow, fontFamily: mono, marginTop: 2 } }, interp.subtitle),
      React.createElement("div", { style: { fontSize: isMobile ? 28 : 36, fontWeight: 700, color: interp.color, fontFamily: mono, marginTop: 4 } }, frictionValue + "%"),
      React.createElement("div", { style: { fontSize: 10, color: t.textLow, textTransform: "uppercase", letterSpacing: "0.15em", fontFamily: mono } }, "Productive Friction"),
    ),
    // Slider track container
    React.createElement("div", {
      ref: trackRef,
      onPointerDown: handlePointerDown,
      onPointerMove: handlePointerMove,
      onPointerUp: handlePointerUp,
      onPointerCancel: handlePointerUp,
      style: {
        position: "relative", height: isMobile ? 56 : 64, cursor: "pointer",
        touchAction: "none", userSelect: "none", WebkitUserSelect: "none",
        margin: "0 " + halfThumb + "px",
      }
    },
      // Track background
      React.createElement("div", { style: {
        position: "absolute", left: 0, right: 0,
        top: "50%", transform: "translateY(-50%)", height: isMobile ? 8 : 10, borderRadius: 5,
        background: t.barTrack,
      } }),
      // Track gradient fill
      React.createElement("div", { style: {
        position: "absolute", left: 0, right: 0,
        top: "50%", transform: "translateY(-50%)", height: isMobile ? 8 : 10, borderRadius: 5,
        background: `linear-gradient(90deg, ${levels.map((l, i) => l.color + " " + levelTrackPct(i) + "%").join(", ")})`,
        opacity: 0.85,
      } }),
      // Level tick marks (vertical lines + colored dot below)
      levels.map((l, i) => {
        const isNearest = interp.nearestIndex === i;
        const isHov = hoveredTick === i && !dragging;
        const lifted = isNearest || isHov;
        return React.createElement("div", { key: l.id,
          onClick: (e) => { e.stopPropagation(); onFrictionChange(l.friction); },
          onMouseEnter: () => !isMobile && setHoveredTick(i),
          onMouseLeave: () => !isMobile && setHoveredTick(null),
          style: {
            position: "absolute", left: levelTrackPct(i) + "%",
            top: "50%", transform: "translateX(-50%)",
            cursor: "pointer", zIndex: lifted ? 2 : 1,
          }
        },
          // Vertical tick line

/* ───────── scroll-hide hook ───────── */
function useScrollHide(threshold = 10) {
  const [visible, setVisible] = useState(true);
  const lastY = useRef(0);
  useEffect(() => {
    const onScroll = () => {
      const y = window.scrollY;
      if (Math.abs(y - lastY.current) < threshold) return;
      setVisible(y < lastY.current || y < 60);
      lastY.current = y;
    };
    window.addEventListener("scroll", onScroll, { passive: true });
    return () => window.removeEventListener("scroll", onScroll);
  }, [threshold]);
  return visible;
}
