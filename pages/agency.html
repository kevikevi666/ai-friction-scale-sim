function useIsMobile(bp = 768) {
  const [m, setM] = useState(() => window.matchMedia(`(max-width: ${bp - 1}px)`).matches);
  useEffect(() => {
    const mql = window.matchMedia(`(max-width: ${bp - 1}px)`);
    const h = e => setM(e.matches);
    mql.addEventListener("change", h);
    return () => mql.removeEventListener("change", h);
  }, []);
  return m;
}

function TerminalLine({ step, isLast, isPlaying }) {
  const base = { fontFamily: term, fontSize: 13, lineHeight: 1.65, whiteSpace: "pre-wrap", wordBreak: "break-word" };
  const PROMPT_USER = React.createElement("span", null,
    React.createElement("span", { style:{ color:"#1a7f1a" } }, "student@school "),
    React.createElement("span", { style:{ color:"#0d5fa5" } }, "~/essay-project "),
    React.createElement("span", { style:{ color:"#999" } }, "% "),
  );

  if (step.t === "blank") return React.createElement("div", { style:{ height:7 } });

  if (step.t === "prompt") return React.createElement("div", { style:base },
    PROMPT_USER,
    isLast && isPlaying && React.createElement("span", { className:"term-cursor" }),
  );

  if (step.t === "cmd") return React.createElement("div", { style:base },
    PROMPT_USER,
    React.createElement("span", { style:{ color:"#1d1d1d" } }, step.v),
  );

  if (step.t === "note") return React.createElement("div", { style:{ ...base, color:"#909090", fontStyle:"italic" } }, step.v);

  if (step.t === "ai")    return React.createElement("div", { style:{ ...base, color:"#1255a0" } }, step.v);

  if (step.t === "agent") return React.createElement("div", { style:{ ...base, color:"#1a7f1a" } },
    React.createElement("span", { style:{ opacity:0.7 } }, "Agent: "),
    step.v,
  );

  if (step.t === "input") return React.createElement("div", { style:{ ...base, color:"#6b21a8" } }, step.v);

  if (step.t === "out")   return React.createElement("div", { style:{ ...base, color:"#555" } }, step.v);

  if (step.t === "write") return React.createElement("div", { style:{ ...base, color:"#1d1d1d" } },
    React.createElement("span", { style:{ color:"#bbb", marginRight:6 } }, ">"),
    "\u201C",
    step.v,
    "\u201D",
  );

  return null;
}

/* ───── component: simulation section ───── */
function SimulationSection({ dark, t, isMobile }) {
  const [simMode, setSimMode] = useState("traditional");
  const [shown, setShown]     = useState([]);
  const [playing, setPlaying] = useState(false);
  const [done, setDone]       = useState(false);
  const cancelRef   = useRef(false);
  const timerRef    = useRef(null);
  const termBodyRef = useRef(null);

  // Reset whenever mode changes
  useEffect(() => {
    cancelRef.current = true;
    clearTimeout(timerRef.current);
    setShown([]);
    setPlaying(false);
    setDone(false);
    // small delay so cancel flag is read before any stale timeout fires
    const t = setTimeout(() => { cancelRef.current = false; }, 20);
    return () => clearTimeout(t);
  }, [simMode]);

  useEffect(() => () => clearTimeout(timerRef.current), []);

  const handlePlay = () => {
    cancelRef.current = false;
    const steps = SIMULATIONS[simMode];
    setPlaying(true);

    function run(idx) {
      if (cancelRef.current) return;
      if (idx >= steps.length) { setPlaying(false); setDone(true); return; }
      const step = steps[idx];
      setShown(prev => [...prev, { ...step, _k: idx }]);
      requestAnimationFrame(() => {
        if (termBodyRef.current) termBodyRef.current.scrollTop = termBodyRef.current.scrollHeight;
      });

function ConstantsDeck({ dark, t, isMobile }) {
  const [active, setActive]   = useState(0);

  const activeRef = useRef(active);
  activeRef.current = active;
  const total = CONSTANTS.length;

  const goTo = (i) => setActive(Math.max(0, Math.min(total - 1, i)));
  const prev = () => goTo(activeRef.current - 1);
  const next = () => goTo(activeRef.current + 1);

  useEffect(() => {
    const h = (e) => { if (e.key==="ArrowRight") next(); if (e.key==="ArrowLeft") prev(); };
    window.addEventListener("keydown", h);
    return () => window.removeEventListener("keydown", h);
  }, []);

  const touchStart = useRef(null);
  const onTouchStart = (e) => { touchStart.current = e.touches[0].clientX; };
  const onTouchEnd   = (e) => {
    if (touchStart.current === null) return;
    const d = touchStart.current - e.changedTouches[0].clientX;
    if (Math.abs(d) > 40) d > 0 ? next() : prev();
    touchStart.current = null;
  };

  const c = CONSTANTS[active];
  const accent = dark ? c.accentDark : c.accentLight;

  return React.createElement("div", null,
    React.createElement("div", {
