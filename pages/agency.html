function useIsMobile(bp = 768) {
  const [m, setM] = useState(() => window.matchMedia(`(max-width: ${bp - 1}px)`).matches);
  useEffect(() => {
    const mql = window.matchMedia(`(max-width: ${bp - 1}px)`);
    const h = e => setM(e.matches);
    mql.addEventListener("change", h);
    return () => mql.removeEventListener("change", h);
  }, []);
  return m;
}

/* ───── component: terminal line ───── */
function TerminalLine({ step, isLast, isPlaying }) {
  const base = { fontFamily: term, fontSize: 13, lineHeight: 1.65, whiteSpace: "pre-wrap", wordBreak: "break-word" };
  const PROMPT_USER = React.createElement("span", null,
    React.createElement("span", { style:{ color:"#1a7f1a" } }, "student@school "),
    React.createElement("span", { style:{ color:"#0d5fa5" } }, "~/essay-project "),
    React.createElement("span", { style:{ color:"#999" } }, "% "),
  );

  if (step.t === "blank") return React.createElement("div", { style:{ height:7 } });

  if (step.t === "prompt") return React.createElement("div", { style:base },
    PROMPT_USER,
    isLast && isPlaying && React.createElement("span", { className:"term-cursor" }),
  );

  if (step.t === "cmd") return React.createElement("div", { style:base },
    PROMPT_USER,
    React.createElement("span", { style:{ color:"#1d1d1d" } }, step.v),
  );

  if (step.t === "note") return React.createElement("div", { style:{ ...base, color:"#909090", fontStyle:"italic" } }, step.v);

  if (step.t === "ai")    return React.createElement("div", { style:{ ...base, color:"#1255a0" } }, step.v);

  if (step.t === "agent") return React.createElement("div", { style:{ ...base, color:"#1a7f1a" } },
    React.createElement("span", { style:{ opacity:0.7 } }, "Agent: "),
    step.v,
  );

  if (step.t === "input") return React.createElement("div", { style:{ ...base, color:"#6b21a8" } }, step.v);

  if (step.t === "out")   return React.createElement("div", { style:{ ...base, color:"#555" } }, step.v);

  if (step.t === "write") return React.createElement("div", { style:{ ...base, color:"#1d1d1d" } },
    React.createElement("span", { style:{ color:"#bbb", marginRight:6 } }, ">"),
    "\u201C",
    step.v,
    "\u201D",
  );

  return null;
}

/* ───── component: simulation section ───── */
function SimulationSection({ dark, t, isMobile }) {
  const [simMode, setSimMode] = useState("traditional");
  const [shown, setShown]     = useState([]);
  const [playing, setPlaying] = useState(false);
  const [done, setDone]       = useState(false);
  const cancelRef   = useRef(false);
  const timerRef    = useRef(null);
  const termBodyRef = useRef(null);

  // Reset whenever mode changes
  useEffect(() => {
    cancelRef.current = true;
    clearTimeout(timerRef.current);
    setShown([]);
    setPlaying(false);
    setDone(false);
    // small delay so cancel flag is read before any stale timeout fires
    const t = setTimeout(() => { cancelRef.current = false; }, 20);
    return () => clearTimeout(t);
  }, [simMode]);

  useEffect(() => () => clearTimeout(timerRef.current), []);

  const handlePlay = () => {
    cancelRef.current = false;
    const steps = SIMULATIONS[simMode];
    setPlaying(true);

    function run(idx) {
      if (cancelRef.current) return;
      if (idx >= steps.length) { setPlaying(false); setDone(true); return; }
      const step = steps[idx];
      setShown(prev => [...prev, { ...step, _k: idx }]);
      requestAnimationFrame(() => {
        if (termBodyRef.current) termBodyRef.current.scrollTop = termBodyRef.current.scrollHeight;
      });
      timerRef.current = setTimeout(() => run(idx + 1), STEP_DELAYS[step.t] ?? 400);
    }
    run(0);
  };

  const handleReset = () => {
    cancelRef.current = true;
    clearTimeout(timerRef.current);
    setShown([]);
    setPlaying(false);
    setDone(false);
    setTimeout(() => { cancelRef.current = false; }, 20);
  };

  const mode = SIM_MODES[simMode];

/* ───── component: constants deck ───── */
function ConstantsDeck({ dark, t, isMobile }) {
  const [active, setActive]   = useState(0);
  const [showAll, setShowAll] = useState(false);
  const activeRef = useRef(active);
  activeRef.current = active;
  const total = CONSTANTS.length;

  const goTo = (i) => setActive(Math.max(0, Math.min(total - 1, i)));
  const prev = () => goTo(activeRef.current - 1);
  const next = () => goTo(activeRef.current + 1);

  useEffect(() => {
    const h = (e) => { if (e.key==="ArrowRight") next(); if (e.key==="ArrowLeft") prev(); };
    window.addEventListener("keydown", h);
    return () => window.removeEventListener("keydown", h);
  }, []);

  const touchStart = useRef(null);
  const onTouchStart = (e) => { touchStart.current = e.touches[0].clientX; };
  const onTouchEnd   = (e) => {
    if (touchStart.current === null) return;
    const d = touchStart.current - e.changedTouches[0].clientX;
    if (Math.abs(d) > 40) d > 0 ? next() : prev();
    touchStart.current = null;
  };

  const c = CONSTANTS[active];
  const accent = dark ? c.accentDark : c.accentLight;

  return React.createElement("div", null,
    React.createElement("div", {
      key: c.id,
      onTouchStart,
      onTouchEnd,
      style:{
        background: t.cardBg,
        border: `1px solid ${accent}28`,
        borderRadius: 20,
        padding: isMobile ? "44px 28px" : "64px 72px",
        textAlign: "center",
        position: "relative",
        overflow: "hidden",
        animation: "fadeUp 0.26s ease",
        boxShadow: `0 4px 48px ${accent}12`,
        minHeight: 280,
        display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
        gap: 24,
        userSelect: "none",
      }
    },
      React.createElement("div", { style:{ position:"absolute", inset:0, background:`radial-gradient(ellipse at 50% -10%, ${accent}10 0%, transparent 65%)`, pointerEvents:"none" } }),
      React.createElement("div", { style:{ fontFamily:spc, fontSize:isMobile?52:82, fontWeight:700, color:accent, lineHeight:1, letterSpacing:"-0.02em", position:"relative" } }, c.verb),
      React.createElement("p", { style:{ fontFamily:serif, fontSize:isMobile?17:20, lineHeight:1.7, color:t.textHigh, maxWidth:520, margin:"0 auto", position:"relative" } }, c.body),
    ),

    React.createElement("div", { style:{ display:"flex", alignItems:"center", justifyContent:"center", gap:20, marginTop:20 } },
      React.createElement("button", {
        onClick: prev, disabled: active===0,
        style:{ background:"transparent", border:`1px solid ${t.cardBorder}`, borderRadius:8, padding:"8px 14px", fontFamily:mono, fontSize:11, color:active===0?t.textFaint:t.textLow, opacity:active===0?0.4:1, transition:"all 0.2s" }
      }, "\u2190 " + (active > 0 ? CONSTANTS[active-1].verb : "")),

      React.createElement("div", { style:{ display:"flex", gap:8, alignItems:"center" } },
        CONSTANTS.map((con, i) => {
          const da = dark ? con.accentDark : con.accentLight;
          return React.createElement("div", { key:con.id, onClick:()=>goTo(i), style:{ width:i===active?22:7, height:7, borderRadius:4, background:i===active?da:t.cardBorder, cursor:"pointer", transition:"all 0.28s" } });
        })
      ),

      React.createElement("button", {
        onClick: next, disabled: active===total-1,
        style:{ background:"transparent", border:`1px solid ${t.cardBorder}`, borderRadius:8, padding:"8px 14px", fontFamily:mono, fontSize:11, color:active===total-1?t.textFaint:t.textLow, opacity:active===total-1?0.4:1, transition:"all 0.2s" }
      }, (active < total-1 ? CONSTANTS[active+1].verb : "") + " \u2192"),
    ),

    React.createElement("div", { style:{ textAlign:"center", marginTop:14 } },
      React.createElement("button", {
        onClick: () => setShowAll(v => !v),
        style:{ background:"transparent", border:"none", fontFamily:mono, fontSize:11, color:t.textLow, textDecoration:"underline", textUnderlineOffset:3, transition:"color 0.2s" }
      }, showAll ? "Close" : "See all five"),
    ),

    showAll && React.createElement("div", {
      style:{ display:"grid", gridTemplateColumns:isMobile?"1fr 1fr":"repeat(5, 1fr)", gap:10, marginTop:16, animation:"fadeUp 0.22s ease" }
    },
      CONSTANTS.map((con, i) => {
        const a = dark ? con.accentDark : con.accentLight;
        return React.createElement("button", {
          key: con.id,
          onClick: () => { goTo(i); setShowAll(false); },
          style:{ padding:"14px 10px", background:i===active?a+"10":t.cardBg, border:`1px solid ${i===active?a:t.cardBorder}`, borderRadius:10, textAlign:"center", transition:"all 0.18s" }
        },
          React.createElement("div", { style:{ fontFamily:spc, fontSize:12, fontWeight:700, color:a, letterSpacing:"0.05em" } }, con.verb),
        );
      })
    ),
  );
}
