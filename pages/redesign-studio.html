  const [m, setM] = useState(() => window.matchMedia(`(max-width: ${bp - 1}px)`).matches);

    const mql = window.matchMedia(`(max-width: ${bp - 1}px)`);

    mql.addEventListener("change", h);
    return () => mql.removeEventListener("change", h);
  }, []);

}

/* ─────────── Claude API layer ─────────── */

async function callClaude(system, user, maxTokens = 4096) {
  // Try Netlify function first
  try {
    const res = await fetch("/.netlify/functions/claude", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ system, user, max_tokens: maxTokens }),
    });
    if (res.ok) {
      const data = await res.json();
      const text = data.content && data.content[0] && data.content[0].text;
      if (!text) throw new Error("Empty response from API.");
      return cleanJSON(text);
    }
    if (res.status !== 404) {
      const errData = await res.json().catch(() => ({}));
      throw new Error(errData.error || "Server error: " + res.status);
    }
    // 404 means no Netlify function, fall through to BYOK
  } catch (err) {
    if (err.message && !err.message.includes("Failed to fetch") && !err.message.includes("NetworkError") && !err.message.includes("404")) {
      throw err;
    }
  }

  // BYOK fallback
  const rawKey = localStorage.getItem("ANTHROPIC_API_KEY");
  const apiKey = rawKey ? rawKey.replace(/[^\x20-\x7E]/g, "").trim() : null;
  if (!apiKey) {
    throw new Error("NO_KEY");
  }

  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true",
    },
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: maxTokens,
      system: system,
      messages: [{ role: "user", content: user }],
    }),
  });

  if (!res.ok) {
    const errData = await res.json().catch(() => ({}));
    const msg = errData.error ? (errData.error.message || JSON.stringify(errData.error)) : "API error: " + res.status;
    if (res.status === 401) throw new Error("BAD_KEY");
    throw new Error(msg);
  }

  const data = await res.json();
  const text = data.content && data.content[0] && data.content[0].text;
  if (!text) throw new Error("Empty response from API.");
  return JSON.parse(text);
}

function cleanJSON(text) {
  let s = text.trim();
  s = s.replace(/```json\s*/gi, "").replace(/```\s*/g, "");
  return JSON.parse(s.trim());
}

const STORAGE_KEY = "redesign_studio_saves";

function loadSaves() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
  } catch { return []; }
}

function addSave(entry) {
  const saves = loadSaves();
  saves.unshift({ ...entry, id: Date.now(), savedAt: new Date().toISOString() });
  if (saves.length > 20) saves.length = 20;
  localStorage.setItem(STORAGE_KEY, JSON.stringify(saves));
}

function deleteSave(id) {
  const saves = loadSaves().filter(s => s.id !== id);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(saves));
}

/* ─────────── markdown-to-elements helper ─────────── */

function renderMarkdown(md, t) {
  if (!md) return null;
  const lines = md.split("\n");
  const els = [];
  let i = 0;
  while (i < lines.length) {
    const line = lines[i];
    if (line.startsWith("### ")) {
      els.push(React.createElement("h4", { key: i, style: { fontFamily: spc, fontSize: 12, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.06em", color: t.text, marginTop: 20, marginBottom: 8 } }, line.slice(4)));
    } else if (line.startsWith("## ")) {
      els.push(React.createElement("h3", { key: i, style: { fontFamily: spc, fontSize: 14, fontWeight: 700, letterSpacing: "0.04em", color: t.text, marginTop: 24, marginBottom: 10 } }, line.slice(3)));
    } else if (line.startsWith("# ")) {
      els.push(React.createElement("h2", { key: i, style: { fontFamily: serif, fontSize: 22, fontWeight: 600, color: t.text, marginTop: 24, marginBottom: 10 } }, line.slice(2)));
    } else if (line.startsWith("- ") || line.startsWith("* ")) {
      els.push(React.createElement("div", { key: i, style: { display: "flex", gap: 10, marginBottom: 6, paddingLeft: 4 } },
        React.createElement("span", { style: { color: t.textLow, flexShrink: 0 } }, "\u2022"),
        React.createElement("span", { style: { fontSize: 16, lineHeight: 1.7, color: t.textHigh } }, renderInline(line.slice(2)))
      ));
    } else if (/^\d+\.\s/.test(line)) {
      const num = line.match(/^(\d+)\.\s/)[1];
      els.push(React.createElement("div", { key: i, style: { display: "flex", gap: 10, marginBottom: 6, paddingLeft: 4 } },
        React.createElement("span", { style: { color: t.textLow, flexShrink: 0, fontFamily: mono, fontSize: 13 } }, num + "."),
        React.createElement("span", { style: { fontSize: 16, lineHeight: 1.7, color: t.textHigh } }, renderInline(line.replace(/^\d+\.\s/, "")))
      ));
    } else if (line.trim() === "") {
      els.push(React.createElement("div", { key: i, style: { height: 8 } }));
    } else {
      els.push(React.createElement("p", { key: i, style: { fontSize: 16, lineHeight: 1.7, color: t.textHigh, marginBottom: 8 } }, renderInline(line)));
    }
    i++;
  }
  return els;
}

function renderInline(text) {
  // Bold and italic
  const parts = [];
  let remaining = text;
  let key = 0;
  const regex = /(\*\*\*(.+?)\*\*\*|\*\*(.+?)\*\*|\*(.+?)\*|`(.+?)`)/g;
  let lastIndex = 0;
  let match;
  while ((match = regex.exec(remaining)) !== null) {
    if (match.index > lastIndex) {
      parts.push(remaining.slice(lastIndex, match.index));
    }
    if (match[2]) {
      parts.push(React.createElement("strong", { key: key++, style: { fontStyle: "italic" } }, match[2]));
    } else if (match[3]) {
      parts.push(React.createElement("strong", { key: key++ }, match[3]));
    } else if (match[4]) {
      parts.push(React.createElement("em", { key: key++ }, match[4]));
    } else if (match[5]) {
      parts.push(React.createElement("code", { key: key++, style: { fontFamily: mono, fontSize: "0.9em", padding: "2px 6px", borderRadius: 4, background: "rgba(128,128,128,0.12)" } }, match[5]));
    }
    lastIndex = match.index + match[0].length;
  }
  if (lastIndex < remaining.length) {
    parts.push(remaining.slice(lastIndex));
  }
  return parts.length > 0 ? parts : text;
}

/* ─────────── share link helpers ─────────── */
// Base64 over UTF-8 via TextEncoder/Decoder (escape/unescape are deprecated).
// Uses URL-safe base64 so the value survives a URL hash round-trip.

function b64EncodeUtf8(str) {
  const bytes = new TextEncoder().encode(str);
  let bin = "";
  for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
  return btoa(bin).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
}

function b64DecodeUtf8(encoded) {
  const normalized = encoded.replace(/-/g, "+").replace(/_/g, "/");
  const pad = normalized.length % 4 === 0 ? "" : "=".repeat(4 - (normalized.length % 4));
  const bin = atob(normalized + pad);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return new TextDecoder().decode(bytes);
}

function encodeShareState(input, diagnosis, redesign) {
  try {
    const state = { input, diagnosis, redesign };
    return b64EncodeUtf8(JSON.stringify(state));
  } catch (e) { return null; }
}

function decodeShareState(encoded) {
  try {
    return JSON.parse(b64DecodeUtf8(encoded));
  } catch (e) { return null; }
}

/* ─────────── print helper ─────────── */
// IMPORTANT: the print window shares the opener's origin (about:blank opened
// via window.open inherits it), so any HTML we inject runs as first-party JS
// with access to localStorage (including a stored BYOK API key). Every
// interpolation below goes through escapeHtml(); the inline markdown
// conversion escapes FIRST, then applies the **bold** / *italic* regex to
// the already-escaped string so the regex can only produce safe <strong>
// and <em> tags around escaped text.

function escapeHtml(value) {
  return String(value == null ? "" : value).replace(/[&<>"']/g, function (c) {
    return c === "&" ? "&amp;"
      : c === "<" ? "&lt;"
      : c === ">" ? "&gt;"
      : c === '"' ? "&quot;"
      : "&#39;";
  });
}

function inlineMarkdownToSafeHtml(line) {
  // Must run AFTER escapeHtml, not before.
  return line
    .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
    .replace(/\*(.+?)\*/g, "<em>$1</em>");
}

function markdownLinesToSafeHtml(md) {
  if (md == null) return "";
  return String(md).split("\n").map(function (rawLine) {
    if (rawLine.startsWith("### ")) return "<h4>" + escapeHtml(rawLine.slice(4)) + "</h4>";
    if (rawLine.startsWith("## "))  return "<h3>" + escapeHtml(rawLine.slice(3)) + "</h3>";
    if (rawLine.startsWith("# "))   return "<h3>" + escapeHtml(rawLine.slice(2)) + "</h3>";
    if (rawLine.startsWith("- ") || rawLine.startsWith("* ")) {
      return "<li>" + inlineMarkdownToSafeHtml(escapeHtml(rawLine.slice(2))) + "</li>";
    }
    if (/^\d+\.\s/.test(rawLine)) {
      return "<li>" + inlineMarkdownToSafeHtml(escapeHtml(rawLine.replace(/^\d+\.\s/, ""))) + "</li>";
    }
    if (rawLine.trim() === "") return "<br>";
    return "<p>" + inlineMarkdownToSafeHtml(escapeHtml(rawLine)) + "</p>";
  }).join("\n");
}

    + "<p>" + escapeHtml(redesign.roleRationale) + "</p>\n"
    + "<h2>Redesigned Assignment</h2>\n"
    + markdownLinesToSafeHtml(redesign.redesignedPrompt) + "\n"
    + "<h2>Transfer Verification Checkpoint</h2>\n"
    + "<div class=\"checkpoint-grid\">\n"
    + "  <span class=\"checkpoint-label\">When</span><span>" + escapeHtml(tc.when) + "</span>\n"
    + "  <span class=\"checkpoint-label\">What</span><span>" + escapeHtml(tc.what) + "</span>\n"
    + "  <span class=\"checkpoint-label\">How</span><span>" + escapeHtml(tc.how) + "</span>\n"
    + "</div>\n"
    + "<h2>Student Reflection Prompts</h2>\n"
    + prompts.map(function (rp) {
        return "<div><span class=\"badge\">" + escapeHtml(rp && rp.constant) + "</span><p>" + escapeHtml(rp && rp.prompt) + "</p></div>";
      }).join("\n") + "\n"
    + "<h2>What This Redesign Develops</h2>\n"
    + "<p>" + escapeHtml(redesign.develops) + "</p>\n"
    + "<hr class=\"divider\">\n"
    + "<p><strong>Does not develop:</strong> " + escapeHtml(redesign.doesNotDevelop) + "</p>\n"
    + "<h2>Change Log</h2>\n"
    + "<ol>" + changes.map(function (c) { return "<li>" + escapeHtml(c) + "</li>"; }).join("\n") + "</ol>\n"
    + "<h2>Diagnosis Summary</h2>\n"
    + "<p><em>" + escapeHtml(diagnosis && diagnosis.diagnosisHeadline) + "</em></p>\n"
    + vulns.map(function (v) {
        return "<div><span class=\"vector\">" + escapeHtml(v && v.vector) + "</span>"
             + "<p>" + escapeHtml(v && v.description) + "</p>"
             + "<p class=\"example\">Example: " + escapeHtml(v && v.example) + "</p></div>";
      }).join("\n") + "\n"
    + "<footer>Generated by Redesign Studio &mdash; AI Agency Toolkit (aiagencytoolkit.com)<br>&copy; 2026 Kevin Farrant. All rights reserved.</footer>\n"
    + "</body>\n</html>";

  const win = window.open("", "_blank");
  if (!win) return;
  win.document.open();
  win.document.write(html);
  win.document.close();
  win.focus();
  // Trigger the print dialog from the opener so the printed document itself
  // carries no inline scripts — makes CSP behavior trivially correct.
  try { win.onload = () => win.print(); } catch (e) { /* popup blockers etc. */ }
  // Fallback: if the document finished writing synchronously, call print directly.
  setTimeout(() => { try { win.print(); } catch (e) {} }, 250);
}

/* ─────────── Screen 5: Redesign ─────────── */

function RedesignScreen({ redesign, diagnosis, input, onSave, onStartOver, dark, t, isMobile }) {
  const accent = dark ? ACCENT.dark : ACCENT.light;
  const targetRoleColor = ROLE_COLORS[input.targetRole]
    ? (dark ? ROLE_COLORS[input.targetRole].dark : ROLE_COLORS[input.targetRole].light)
    : accent;
  const [copied, setCopied] = useState(false);
  const [shared, setShared] = useState(false);
  const [saved, setSaved] = useState(false);

  function handleExport() {
    const md = buildExportMarkdown(redesign, diagnosis, input);
    navigator.clipboard.writeText(md).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    });
  }

  function handleShare() {
    const encoded = encodeShareState(input, diagnosis, redesign);
    if (!encoded) return;
    const url = window.location.origin + window.location.pathname + '#share=' + encoded;
    navigator.clipboard.writeText(url).then(() => {
      setShared(true);
      setTimeout(() => setShared(false), 2500);
    });
  }

  function handlePrint() {
    openPrintWindow(redesign, diagnosis, input);
  }

  function handleSave() {
    onSave();
    setSaved(true);
    setTimeout(() => setSaved(false), 2000);
  }

    // Role badge

      React.createElement("div", { style: { fontFamily: mono, fontSize: 10, textTransform: "uppercase", letterSpacing: "0.15em", color: t.textLow, marginBottom: 10 } }, "Why this role"),
      React.createElement("p", { style: { fontSize: 16, lineHeight: 1.7, color: t.textHigh, margin: 0 } }, redesign.roleRationale),
    ),

    // Redesigned prompt

    },
      React.createElement("div", { style: { fontFamily: mono, fontSize: 10, textTransform: "uppercase", letterSpacing: "0.15em", color: t.textLow, marginBottom: 16 } }, "Redesigned assignment"),

    // Transfer checkpoint
    React.createElement("div", {
      style: { background: dark ? `${targetRoleColor}08` : `${targetRoleColor}05`, border: `1px solid ${targetRoleColor}20`, borderRadius: 16, padding: isMobile ? "20px 18px" : "24px 28px", marginBottom: 16 }
    },
      React.createElement("div", { style: { fontFamily: mono, fontSize: 10, textTransform: "uppercase", letterSpacing: "0.15em", color: targetRoleColor, marginBottom: 14 } }, "Transfer Verification Checkpoint"),
      React.createElement("div", { style: { display: "flex", flexDirection: "column", gap: 12 } },
        React.createElement("div", null,
          React.createElement("span", { style: { fontFamily: mono, fontSize: 10, color: t.textLow, textTransform: "uppercase", letterSpacing: "0.1em" } }, "When: "),
          React.createElement("span", { style: { fontSize: 15, color: t.textHigh } }, redesign.transferCheckpoint.when),
        ),
        React.createElement("div", null,
          React.createElement("span", { style: { fontFamily: mono, fontSize: 10, color: t.textLow, textTransform: "uppercase", letterSpacing: "0.1em" } }, "What: "),
          React.createElement("span", { style: { fontSize: 15, color: t.textHigh } }, redesign.transferCheckpoint.what),

        React.createElement("div", null,

          React.createElement("span", { style: { fontSize: 15, color: t.textHigh } }, redesign.transferCheckpoint.how),
        ),
      ),
    ),

    // Reflection prompts
    React.createElement("div", {

    },
      React.createElement("div", { style: { fontFamily: mono, fontSize: 10, textTransform: "uppercase", letterSpacing: "0.15em", color: t.textLow, marginBottom: 16 } }, "Student reflection prompts"),
      React.createElement("div", { style: { display: "flex", flexDirection: "column", gap: 16 } },
        ...redesign.reflectionPrompts.map((rp, i) =>

            }, rp.constant),
            React.createElement("p", { style: { fontSize: 16, lineHeight: 1.7, color: t.textHigh, margin: "6px 0 0" } }, rp.prompt),
          )

      ),
    ),

    // Develops / does not develop
    React.createElement("div", {
      style: { background: t.cardBg, border: `1px solid ${t.cardBorder}`, borderRadius: 16, padding: isMobile ? "20px 18px" : "24px 28px", marginBottom: 16, boxShadow: t.cardShadow }
    },
      React.createElement("div", { style: { fontFamily: mono, fontSize: 10, textTransform: "uppercase", letterSpacing: "0.15em", color: t.textLow, marginBottom: 12 } }, "What this redesign develops"),
      React.createElement("p", { style: { fontSize: 16, lineHeight: 1.7, color: t.textHigh, margin: "0 0 16px" } }, redesign.develops),
      React.createElement("div", { style: { height: 1, background: t.divider, marginBottom: 16 } }),
      React.createElement("div", { style: { fontFamily: mono, fontSize: 10, textTransform: "uppercase", letterSpacing: "0.15em", color: t.textLow, marginBottom: 12 } }, "What it does not develop"),
      React.createElement("p", { style: { fontSize: 16, lineHeight: 1.7, color: t.textHigh, margin: 0 } }, redesign.doesNotDevelop),
    ),

    // Change log
    React.createElement("div", {
      style: { background: t.cardBg, border: `1px solid ${t.cardBorder}`, borderRadius: 16, padding: isMobile ? "20px 18px" : "24px 28px", marginBottom: 28, boxShadow: t.cardShadow }
    },
      React.createElement("div", { style: { fontFamily: mono, fontSize: 10, textTransform: "uppercase", letterSpacing: "0.15em", color: t.textLow, marginBottom: 14 } }, "Change log"),
      React.createElement("div", { style: { display: "flex", flexDirection: "column", gap: 10 } },
        ...redesign.changeLog.map((change, i) =>
          React.createElement("div", { key: i, style: { display: "flex", gap: 10, alignItems: "flex-start" } },
            React.createElement("span", { style: { fontFamily: mono, fontSize: 11, color: accent, fontWeight: 700, flexShrink: 0 } }, `${i + 1}.`),
            React.createElement("span", { style: { fontSize: 15, lineHeight: 1.65, color: t.textHigh } }, change),
          )
        ),
      ),
    ),

    // Actions
    React.createElement("div", { style: { display: "flex", justifyContent: "center", gap: 10, flexWrap: "wrap", marginBottom: 16 } },
      React.createElement("button", {
        onClick: handleExport,
        style: { padding: "12px 22px", background: accent, color: "#fff", border: "none", borderRadius: 100, fontSize: 13, fontWeight: 600, cursor: "pointer", fontFamily: mono, transition: "opacity 0.2s" }
      }, copied ? "Copied!" : "Copy Markdown"),
      React.createElement("button", {
        onClick: handleShare,
        style: { padding: "12px 22px", background: "transparent", border: `1px solid ${accent}`, borderRadius: 100, fontSize: 13, fontWeight: 600, color: accent, cursor: "pointer", fontFamily: mono }
      }, shared ? "Link Copied!" : "Share Link"),
      React.createElement("button", {
        onClick: handlePrint,
        style: { padding: "12px 22px", background: "transparent", border: `1px solid ${t.cardBorder}`, borderRadius: 100, fontSize: 13, color: t.textMid, cursor: "pointer", fontFamily: mono }
      }, "Print / PDF"),
      React.createElement("button", {
        onClick: handleSave,
        style: { padding: "12px 22px", background: "transparent", border: `1px solid ${t.cardBorder}`, borderRadius: 100, fontSize: 13, color: t.textMid, cursor: "pointer", fontFamily: mono }
      }, saved ? "Saved!" : "Save"),
      React.createElement("button", {
        onClick: onStartOver,
        style: { padding: "12px 22px", background: "transparent", border: `1px solid ${t.cardBorder}`, borderRadius: 100, fontSize: 13, color: t.textFaint, cursor: "pointer", fontFamily: mono }
      }, "Redesign another"),
    ),

    // Assessment Check footer
    React.createElement("div", { style: { textAlign: "center", marginTop: 28, paddingTop: 20, borderTop: `1px solid ${t.divider}` } },
      React.createElement("a", {
        href: "/pages/assessment.html",
        target: "_blank",
        rel: "noopener noreferrer",
        style: { fontFamily: mono, fontSize: 11, color: t.textLow, textDecoration: "none", letterSpacing: "0.04em", transition: "color 0.15s" },
        onMouseEnter: (e) => e.target.style.color = accent,
        onMouseLeave: (e) => e.target.style.color = t.textLow,
      }, "Have your students run their final submission through Assessment Check →"),
    ),
  );
}

/* ─────────── export helper ─────────── */

function buildExportMarkdown(redesign, diagnosis, input) {
  const lines = [];
  lines.push(`# Assignment Redesign: ${input.targetRole} Mode`);
  lines.push("");
  if (input.grade) lines.push(`**Grade/Subject:** ${input.grade}`);
  lines.push("");
  lines.push("## Why This Role");
  lines.push("");
  lines.push(redesign.roleRationale);
  lines.push("");
  lines.push("## Redesigned Assignment");
  lines.push("");
  lines.push(redesign.redesignedPrompt);
  lines.push("");
  lines.push("## Transfer Verification Checkpoint");
  lines.push("");
  lines.push(`**When:** ${redesign.transferCheckpoint.when}`);
  lines.push(`**What:** ${redesign.transferCheckpoint.what}`);
  lines.push(`**How:** ${redesign.transferCheckpoint.how}`);
  lines.push("");
  lines.push("## Student Reflection Prompts");
  lines.push("");
  redesign.reflectionPrompts.forEach(rp => {
    lines.push(`**${rp.constant}:** ${rp.prompt}`);
    lines.push("");
  });
  lines.push("## What This Redesign Develops");
  lines.push("");
  lines.push(redesign.develops);
  lines.push("");
  lines.push("## What It Does Not Develop");
  lines.push("");
  lines.push(redesign.doesNotDevelop);
  lines.push("");
  lines.push("## Change Log");
  lines.push("");
  redesign.changeLog.forEach((c, i) => {
    lines.push(`${i + 1}. ${c}`);
  });
  lines.push("");
  lines.push("---");
  lines.push("*Generated by the Redesign Studio, part of the AI Agency Toolkit (aiagencytoolkit.com)*");
  return lines.join("\n");
}

/* ─────────── App ─────────── */

function App() {
  const [dark, setDark] = useState(false);
  const isMobile = useIsMobile();
  const t = useTheme(dark);
  const accent = dark ? ACCENT.dark : ACCENT.light;

  // screen: "input" | "diagnosing" | "diagnosis" | "redesigning" | "redesign" | "loaded"
  const [screen, setScreen] = useState("input");
  const [input, setInput] = useState(null);
  const [diagnosis, setDiagnosis] = useState(null);
  const [redesign, setRedesign] = useState(null);
  const [error, setError] = useState(null);
  const [showKeyModal, setShowKeyModal] = useState(false);
  const [savedRedesigns, setSavedRedesigns] = useState(loadSaves);
  const pendingAction = useRef(null);

  useEffect(() => {
    const hash = window.location.hash;
    if (hash.startsWith('#share=')) {
      const state = decodeShareState(hash.slice(7));
      if (state && state.input && state.diagnosis && state.redesign) {
        setInput(state.input);
        setDiagnosis(state.diagnosis);
        setRedesign(state.redesign);
        setScreen("redesign");
        window.history.replaceState(null, '', window.location.pathname);
        window.scrollTo({ top: 0 });
      }
    }
  }, []);

  useEffect(() => {
    document.body.style.background = t.bg;
    document.body.style.color = t.text;
  }, [dark, t.bg, t.text]);

  function refreshSaves() {
    setSavedRedesigns(loadSaves());
  }

  async function handleDiagnose(data) {
    setInput(data);
    setScreen("diagnosing");
    setError(null);
    try {
      const prompts = buildDiagnosePrompts(data.assignment, data.grade, data.targetRole, data.targetFriction);
      const result = await callClaude(prompts.system, prompts.user);
      setDiagnosis(result);
      setScreen("diagnosis");
      window.scrollTo({ top: 0, behavior: "smooth" });
    } catch (err) {
      if (err.message === "NO_KEY") {
        pendingAction.current = () => handleDiagnose(data);
        setShowKeyModal(true);
        setScreen("input");
        return;
      }
      if (err.message === "BAD_KEY") {
        setError("Invalid API key. Please check your key and try again. You can update it below.");
        localStorage.removeItem("ANTHROPIC_API_KEY");
        setScreen("input");
        return;
      }
      setError(err.message || "Something went wrong. Please try again.");
      setScreen("input");
    }
  }

  async function handleRedesign() {
    setScreen("redesigning");
    setError(null);
    try {
      const prompts = buildRedesignPrompts(input.assignment, input.grade, input.targetRole, input.targetFriction, diagnosis);
      const result = await callClaude(prompts.system, prompts.user, 4096);
      setRedesign(result);
      setScreen("redesign");
      window.scrollTo({ top: 0, behavior: "smooth" });
    } catch (err) {
      if (err.message === "NO_KEY") {
        pendingAction.current = () => handleRedesign();
        setShowKeyModal(true);
        setScreen("diagnosis");
        return;
      }
      if (err.message === "BAD_KEY") {
        setError("Invalid API key. Please check your key and try again.");
        localStorage.removeItem("ANTHROPIC_API_KEY");
        setScreen("diagnosis");
        return;
      }
      setError(err.message || "Something went wrong. Please try again.");
      setScreen("diagnosis");
    }
  }

  function handleSave() {
    addSave({
      assignment: input.assignment,
      grade: input.grade,
      targetRole: input.targetRole,
      targetFriction: input.targetFriction,
      diagnosis,
      redesign,
    });
    refreshSaves();
  }

  function handleLoadSave(save) {
    setInput({ assignment: save.assignment, grade: save.grade, targetRole: save.targetRole, targetFriction: save.targetFriction });
    setDiagnosis(save.diagnosis);
    setRedesign(save.redesign);
    setScreen("redesign");
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  function handleDeleteSave(id) {
    deleteSave(id);
    refreshSaves();
  }

  function handleStartOver() {
    setScreen("input");
    setInput(null);
    setDiagnosis(null);
    setRedesign(null);
    setError(null);
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  function handleKeyModalSave() {
    setShowKeyModal(false);
    if (pendingAction.current) {
      const action = pendingAction.current;
      pendingAction.current = null;
      action();
    }
  }

  const hasKey = !!localStorage.getItem("ANTHROPIC_API_KEY");

  return React.createElement("div", {
    style: { minHeight: "100vh", display: "flex", flexDirection: "column", background: t.bg, color: t.text, position: "relative", overflow: "hidden" }
  },
    // Background overlays
    React.createElement("div", {
      style: { position: "fixed", inset: 0, pointerEvents: "none",
        backgroundImage: `radial-gradient(circle at 20% 50%, ${accent}06 0%, transparent 50%), radial-gradient(circle at 80% 20%, ${accent}04 0%, transparent 40%)` }
    }),
    React.createElement("div", {
      style: { position: "fixed", inset: 0, pointerEvents: "none", opacity: dark ? 0.03 : 0.015,
        backgroundImage: `url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")` }
    }),

    React.createElement(Header, { dark, setDark, t, isMobile }),

    // API key management (BYOK)
    screen === "input" && hasKey && React.createElement("div", {
      style: { position: "relative", zIndex: 1, maxWidth: 760, margin: "0 auto", padding: "8px 20px 0", textAlign: "right" }
    },
      React.createElement("button", {
        onClick: () => { localStorage.removeItem("ANTHROPIC_API_KEY"); refreshSaves(); handleStartOver(); },
        style: { fontFamily: mono, fontSize: 9, color: t.textFaint, background: "transparent", border: "none", cursor: "pointer", letterSpacing: "0.04em" }
      }, "Remove saved API key"),
    ),

    React.createElement("main", {
      style: { flex: 1, position: "relative", zIndex: 1, padding: isMobile ? "28px 16px 48px" : "40px 32px 64px" }
    },
      error && React.createElement("div", { style: { maxWidth: 700, margin: "0 auto 20px" } },
        React.createElement(ErrorMessage, { message: error, onRetry: () => setError(null), dark, t })
      ),

      screen === "input" && React.createElement(InputScreen, {
        onDiagnose: handleDiagnose, dark, t, isMobile,
        savedRedesigns, onLoadSave: handleLoadSave, onDeleteSave: handleDeleteSave,
      }),

      screen === "diagnosing" && React.createElement(LoadingScreen, { message: "Diagnosing assignment against the Agency Spectrum...", dark, t }),

      screen === "diagnosis" && diagnosis && React.createElement(DiagnosisScreen, {
        diagnosis, input, onRedesign: handleRedesign, onStartOver: handleStartOver, dark, t, isMobile,
      }),

      screen === "redesigning" && React.createElement(LoadingScreen, { message: "Redesigning assignment for " + (input ? input.targetRole : "") + " mode...", dark, t }),

      (screen === "redesign" || screen === "loaded") && redesign && React.createElement(RedesignScreen, {
        redesign, diagnosis, input, onSave: handleSave, onStartOver: handleStartOver, dark, t, isMobile,
      }),
    ),

    // Footer (shared)
    SiteNav.renderFooter({ isMobile, t, currentPage: "redesign-studio" }),

    // Key modal
    showKeyModal && React.createElement(ApiKeyModal, {
      dark, t,
      onClose: () => { setShowKeyModal(false); pendingAction.current = null; },
      onSave: handleKeyModalSave,
    }),
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
</script>
