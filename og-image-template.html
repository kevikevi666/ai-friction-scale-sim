<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background: #0a0a0f;
  }
  @import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@300;400;600&family=Space+Mono:wght@400;700&display=swap');
  body {
    font-family: 'Crimson Pro', Georgia, serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #0a0a0f;
    color: #f5f0e8;
    gap: 0;
    padding-bottom: 20px;
  }

  .title {
    font-family: 'Crimson Pro', Georgia, serif;
    font-weight: 300;
    font-size: 84px;
    letter-spacing: 0.01em;
    color: #f5f0e8;
    line-height: 1;
    text-align: center;
    margin-bottom: 38px;
  }

  .circles {
    display: flex;
    gap: 16px;
    margin-bottom: 28px;
  }

  .circle {
    width: 26px;
    height: 26px;
    border-radius: 50%;
  }

  .c1 { background: #2A9D8F; }
  .c2 { background: #F4A261; }
  .c3 { background: #818cf8; }

  .subtitle {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: #5a5a72;
    text-align: center;
  }
</style>
</head>
<body>
  <div class="title">AI Agency Toolkit</div>
  <div class="circles">
    <div class="circle c1"></div>
    <div class="circle c2"></div>
    <div class="circle c3"></div>
  </div>
  <div class="subtitle">Tools for thinking about AI and agency</div>
</body>
</html>
