[build]
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Security headers applied to every response.
# CSP note: 'unsafe-eval' is required because pages use <script type="text/babel">
# which is compiled at runtime by babel-standalone. 'unsafe-inline' is required
# because every page uses inline <script type="text/babel"> blocks and inline
# style attributes on React-created elements. Removing either requires
# precompiling JSX and extracting styles into a stylesheet.
[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data:; connect-src 'self' https://api.anthropic.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=(), interest-cohort=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-Frame-Options = "DENY"
