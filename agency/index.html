/* ───────── responsive hook ───────── */
function useIsMobile(bp = 768) {
  const query = `(max-width: ${bp - 1}px)`;
  const [m, setM] = useState(() => window.matchMedia(query).matches);
  useEffect(() => {
    const mql = window.matchMedia(query);
    const h = (e) => setM(e.matches);
    mql.addEventListener("change", h);
    return () => mql.removeEventListener("change", h);
  }, [query]);
  return m;
}

/* ───────── Section 1: What Changed ───────── */
function WhatChanged({ t, isMobile }) {
  // Phase: "idle" | "chat" | "pause" | "agent" | "done"
  const [phase, setPhase] = useState("idle");
  const [chatStep, setChatStep] = useState(0);
  const [agentStep, setAgentStep] = useState(0);
  const timerRef = useRef(null);

  const chatSteps = [
    { role: "student", text: "What were the main causes of WWI?" },
    { role: "ai", text: "The main causes include nationalism, militarism, alliances, and imperialism..." },
    { role: "student", text: "Can you help me outline an essay about this?" },
    { role: "ai", text: "Here's a possible outline: I. Introduction, II. Nationalism..." },
  ];

  const agentSteps = [
    { role: "student", text: "Research WWI causes. Find primary sources. Write an analytical essay arguing alliance systems were the primary cause." },
    { role: "agent", text: "Planning: 1) Search for primary sources 1910-1914, 2) Analyze alliance treaties, 3) Draft argumentative essay, 4) Self-review for quality" },
    { role: "agent", text: "Searching academic databases... Found 12 sources. Selecting 4 most relevant. Reading and extracting key evidence..." },
    { role: "agent", text: "Draft complete. 5 paragraphs, 3 primary sources cited. Thesis: 'The interlocking alliance system transformed a regional crisis into a continental war.' Ready for your review." },
  ];

  const startAnimation = useCallback(() => {
    setChatStep(0);
    setAgentStep(0);
    setPhase("chat");
  }, []);

  useEffect(() => {
    if (phase === "idle" || phase === "done") return;

    if (phase === "chat") {
      if (chatStep >= chatSteps.length) {
        // Chat finished, pause before agent starts
        timerRef.current = setTimeout(() => setPhase("pause"), 600);
        return () => clearTimeout(timerRef.current);
      }
      timerRef.current = setTimeout(() => setChatStep(s => s + 1), 1600);
      return () => clearTimeout(timerRef.current);
    }

    if (phase === "pause") {
      timerRef.current = setTimeout(() => setPhase("agent"), 1200);
      return () => clearTimeout(timerRef.current);
    }

    if (phase === "agent") {
      if (agentStep >= agentSteps.length) {
        setPhase("done");
        return;
      }
      timerRef.current = setTimeout(() => setAgentStep(s => s + 1), 2000);
      return () => clearTimeout(timerRef.current);
    }
  }, [phase, chatStep, agentStep]);

  const isPlaying = phase !== "idle" && phase !== "done";
  const hasPlayed = phase === "done";

  const renderMessages = (steps, visibleCount, isAgent) => {
    return steps.map((step, i) => {
      const visible = i < visibleCount;
      const isAI = step.role === "ai" || step.role === "agent";
      return React.createElement("div", {
        key: i,
        style: {
          opacity: visible ? 1 : 0.12,
          transform: visible ? "translateY(0)" : "translateY(8px)",
          transition: "all 0.5s ease",
          display: "flex",
          gap: 10,
          marginBottom: 12,
          alignItems: "flex-start",
        }
      },
        React.createElement("div", {
          style: {
            width: 28, height: 28, borderRadius: "50%", flexShrink: 0,
            background: isAI ? (isAgent ? t.hot + "20" : t.accent + "20") : t.textFaint,
            display: "flex", alignItems: "center", justifyContent: "center",
            fontSize: 13,
          }
        }, isAI ? (isAgent ? "\uD83E\uDD16" : "\uD83D\uDCAC") : "\uD83D\uDC64"),
        React.createElement("div", {
          style: {
            lineHeight: 1.6, color: t.textHigh,
            padding: "8px 12px", borderRadius: 8,
            background: isAI ? (isAgent ? t.hot + "08" : t.accent + "08") : t.cardBg,
            border: isAI ? `1px solid ${isAgent ? t.hot + "18" : t.accent + "18"}` : t.cardBorder,
            fontFamily: isAI ? mono : "inherit",
            fontSize: isAI ? (isMobile ? 13 : 14) : (isMobile ? 15 : 16),
            maxWidth: "85%",
          }
        }, step.text),
      );
    });
  };

  // Which column is "active" right now?
  const chatActive = phase === "chat" || phase === "pause" || phase === "agent" || phase === "done";
  const agentActive = phase === "agent" || phase === "done";
  const showTransition = phase === "pause";

  return React.createElement("section", {
    style: { marginBottom: isMobile ? 48 : 72 }
  },
    React.createElement("h2", {
      style: {
        fontSize: isMobile ? 11 : 12, fontFamily: mono, textTransform: "uppercase",
        letterSpacing: "0.15em", color: t.textLow, marginBottom: 12,
      }
    }, "Section 01"),
    React.createElement("h3", {
      style: {
        fontSize: isMobile ? 26 : 36, fontWeight: 300, color: t.text,
        marginBottom: 10, lineHeight: 1.2,
      }
    }, "What Changed"),
    React.createElement("p", {
      style: { fontSize: isMobile ? 16 : 19, color: t.textHigh, lineHeight: 1.7, marginBottom: 28, maxWidth: 680 }
    }, "Most teachers think of AI as a conversation. You ask, it answers. But a new kind of AI doesn't wait for each instruction. It plans, researches, builds, and delivers, on its own."),

    // Play button
    React.createElement("button", {
      onClick: startAnimation,
      style: {
        fontFamily: mono, fontSize: 12, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.12em",
        padding: "12px 28px", borderRadius: 8,
        background: isPlaying ? t.textFaint : t.accent,
        border: `1px solid ${isPlaying ? t.textGhost : t.accent}`,
        color: isPlaying ? t.textLow : (t.bg === "#0a0a0f" ? "#0a0a0f" : "#fff"),
        marginBottom: 24, cursor: isPlaying ? "default" : "pointer",
        transition: "all 0.3s", boxShadow: isPlaying ? "none" : `0 2px 12px ${t.accent}40`,
      },
      disabled: isPlaying,
    }, isPlaying ? "Playing..." : hasPlayed ? "\u21BB Replay" : "\u25B6 Watch the Difference"),

    // Transition label between phases
    showTransition && React.createElement("div", {
      style: {
        textAlign: "center", padding: "12px 0", marginBottom: 16,
        animation: "fadeIn 0.5s ease",
      }
    },
      React.createElement("span", {
        style: { fontSize: 12, fontFamily: mono, textTransform: "uppercase", letterSpacing: "0.15em", color: t.warn }
      }, "Now watch the same task with agentic AI..."),
    ),

    // Two columns
    React.createElement("div", {
      style: {
        display: "grid",
        gridTemplateColumns: isMobile ? "1fr" : "1fr 1fr",
        gap: isMobile ? 24 : 32,
      }
    },
      // Chatbot column
      React.createElement("div", {
        style: {
          background: t.cardBg, border: t.cardBorder, borderRadius: 12,
          padding: isMobile ? 16 : 24, boxShadow: t.cardShadow,
          opacity: chatActive ? 1 : 0.4,
          transition: "opacity 0.5s ease",
        }
      },
        React.createElement("div", {
          style: {
            fontSize: 10, fontFamily: mono, textTransform: "uppercase",
            letterSpacing: "0.15em", color: t.accent, marginBottom: 16,
            display: "flex", alignItems: "center", gap: 8,
          }
        },
          React.createElement("span", {
            style: { width: 8, height: 8, borderRadius: "50%", background: t.accent }
          }),
          "Conversational AI (Today)"
        ),
        React.createElement("div", { style: { minHeight: 200 } }, renderMessages(chatSteps, chatStep, false)),
        React.createElement("div", {
          style: { fontSize: 12, color: t.textFaint, fontFamily: mono, marginTop: 12, fontStyle: "italic" }
        }, "Student drives every step. AI responds to individual requests."),
      ),

      // Agent column
      React.createElement("div", {
        style: {
          background: t.cardBg, border: t.cardBorder, borderRadius: 12,
          padding: isMobile ? 16 : 24, boxShadow: t.cardShadow,
          opacity: agentActive ? 1 : 0.25,
          transition: "opacity 0.5s ease",
        }
      },
        React.createElement("div", {
          style: {
            fontSize: 10, fontFamily: mono, textTransform: "uppercase",
            letterSpacing: "0.15em", color: t.hot, marginBottom: 16,
            display: "flex", alignItems: "center", gap: 8,
          }
        },
          React.createElement("span", {
            style: { width: 8, height: 8, borderRadius: "50%", background: t.hot }
          }),
          "Agentic AI (Arriving Now)"
        ),
        React.createElement("div", { style: { minHeight: 200 } }, renderMessages(agentSteps, agentStep, true)),
        React.createElement("div", {
          style: { fontSize: 12, color: t.textFaint, fontFamily: mono, marginTop: 12, fontStyle: "italic" }
        }, "One instruction. AI plans, executes, and delivers autonomously."),
      ),
    ),
  );
}

/* ───────── Section 2: The Agency Spectrum ───────── */

/* ───────── Section 3: Walk Through a Task ───────── */
function WalkThrough({ t, isMobile }) {
  const [scenarioId, setScenarioId] = useState("history-essay");
  const [activePhase, setActivePhase] = useState(0);
  const scenario = SCENARIOS.find(s => s.id === scenarioId);
  const data = WALKTHROUGH_DATA[scenarioId];

  const PhaseCard = ({ roleId, phaseData, color }) => {
    const roleName = ROLES.find(r => r.id === roleId).name;
    const roleIcon = ROLES.find(r => r.id === roleId).icon;
    return React.createElement("div", {
      style: {
        background: t.cardBg, border: t.cardBorder, borderRadius: 12,
        padding: isMobile ? 14 : 20, boxShadow: t.cardShadow,
        borderTop: `2px solid ${color}`,
        animation: "fadeIn 0.4s ease",
        flex: 1, minWidth: 0,
      }
    },
      React.createElement("div", {
        style: { fontSize: 10, fontFamily: mono, textTransform: "uppercase", letterSpacing: "0.12em", color: color, marginBottom: 14, fontWeight: 700 }
      }, `${roleIcon} ${roleName}`),

      // Student
      React.createElement("div", { style: { marginBottom: 12 } },
        React.createElement("div", { style: { fontSize: 9, fontFamily: mono, textTransform: "uppercase", letterSpacing: "0.1em", color: t.textFaint, marginBottom: 4 } }, "Student"),
        React.createElement("p", { style: { fontSize: isMobile ? 13 : 14, lineHeight: 1.6, color: t.textHigh, margin: 0 } }, phaseData.student),
      ),

      // AI
      React.createElement("div", { style: { marginBottom: 12 } },
        React.createElement("div", { style: { fontSize: 9, fontFamily: mono, textTransform: "uppercase", letterSpacing: "0.1em", color: t.textFaint, marginBottom: 4 } }, "AI"),
        React.createElement("p", { style: { fontSize: isMobile ? 13 : 14, lineHeight: 1.6, color: t.textMid, margin: 0, fontFamily: mono, fontSize: isMobile ? 11 : 12 } }, phaseData.ai),
      ),

      // Learning
      React.createElement("div", {
        style: { padding: "8px 12px", borderRadius: 6, background: color + "08", border: `1px solid ${color}15` }
      },
        React.createElement("div", { style: { fontSize: 9, fontFamily: mono, textTransform: "uppercase", letterSpacing: "0.1em", color: color, marginBottom: 3 } }, "Learning"),
        React.createElement("p", { style: { fontSize: isMobile ? 12 : 13, lineHeight: 1.5, color: t.textHigh, margin: 0 } }, phaseData.learning),
      ),
    );
  };

  return React.createElement("section", {
    style: { marginBottom: isMobile ? 48 : 72 }
  },
    React.createElement("h2", {
      style: {
        fontSize: isMobile ? 11 : 12, fontFamily: mono, textTransform: "uppercase",
        letterSpacing: "0.15em", color: t.textLow, marginBottom: 12,
      }
    }, "Section 03"),
    React.createElement("h3", {

        fontSize: isMobile ? 26 : 36, fontWeight: 300, color: t.text,
        marginBottom: 10, lineHeight: 1.2,
      }
    }, "Walk Through a Task"),
    React.createElement("p", {
      style: { fontSize: isMobile ? 16 : 19, color: t.textHigh, lineHeight: 1.7, marginBottom: 28, maxWidth: 680 }
    }, "See the same assignment play out across all three modes. At each phase, notice what the student is actually doing, and what they're learning."),

    // Scenario picker
    React.createElement("div", {
      style: { display: "flex", gap: 8, marginBottom: 20, flexWrap: "wrap" }
    },
      SCENARIOS.map(s =>
        React.createElement("button", {
          key: s.id,
          onClick: () => { setScenarioId(s.id); setActivePhase(0); },
          style: {
            fontFamily: mono, fontSize: 11, padding: "8px 16px", borderRadius: 6,
            background: scenarioId === s.id ? t.accent + "15" : t.btnBg,
            border: scenarioId === s.id ? `1px solid ${t.accent}40` : t.btnBorder,
            color: scenarioId === s.id ? t.accent : t.textMid,
            transition: "all 0.3s",
          }
        }, `${s.icon} ${s.name}`)
      )
    ),

    // Assignment description
    React.createElement("div", {
      style: {
        padding: "12px 16px", borderRadius: 8, background: t.cardBg, border: t.cardBorder,
        marginBottom: 24,
      }
    },
      React.createElement("span", { style: { fontSize: 10, fontFamily: mono, textTransform: "uppercase", letterSpacing: "0.1em", color: t.textFaint } }, `${scenario.subject} `),
      React.createElement("span", { style: { fontSize: isMobile ? 14 : 15, color: t.textHigh, lineHeight: 1.6 } }, scenario.assignment),
    ),

    // Phase timeline
    React.createElement("div", {
      style: {
        display: "flex", gap: 0, marginBottom: 28, overflow: "auto",
        paddingBottom: 4,

        React.createElement("button", {

            border: "none", borderBottom: activePhase === i ? `2px solid ${t.accent}` : `2px solid transparent`,

            cursor: "pointer", transition: "all 0.3s", whiteSpace: "nowrap",
            fontWeight: activePhase === i ? 700 : 400,
          }
        }, `${i + 1}. ${phase}`)
      )

    // Three columns for the active phase
    React.createElement("div", {
      key: `${scenarioId}-${activePhase}`,
      style: {
        display: "grid",
        gridTemplateColumns: isMobile ? "1fr" : "1fr 1fr 1fr",
        gap: isMobile ? 16 : 20,

      React.createElement(PhaseCard, { roleId: "executor", phaseData: data.executor[activePhase], color: t.executor }),
      React.createElement(PhaseCard, { roleId: "director", phaseData: data.director[activePhase], color: t.director }),
      React.createElement(PhaseCard, { roleId: "steward", phaseData: data.steward[activePhase], color: t.steward }),

/* ───────── Section 5: Attribution ───────── */
function Attribution({ t, isMobile }) {
  return React.createElement("section", {
    style: { marginBottom: isMobile ? 32 : 48 }

    React.createElement("h2", {
      style: {
        fontSize: isMobile ? 11 : 12, fontFamily: mono, textTransform: "uppercase",
        letterSpacing: "0.15em", color: t.textLow, marginBottom: 12,
      }

    React.createElement("h3", {
      style: {
        fontSize: isMobile ? 22 : 28, fontWeight: 300, color: t.text,
        marginBottom: 10, lineHeight: 1.2,
      }

    React.createElement("div", {
      style: { maxWidth: 680, fontSize: isMobile ? 15 : 17, color: t.textHigh, lineHeight: 1.8, marginBottom: 24 }
    },
      React.createElement("p", { style: { marginBottom: 16 } },
        "The AI Friction Scale, developed by Jane Beckwith (2025) and building on the AI Assessment Scale by Perkins, Furze, Roe, and MacVaugh, provides a powerful framework for understanding levels of AI involvement in student work. It was designed for conversational AI, the ask-and-answer model that most educators know."

      React.createElement("p", { style: { marginBottom: 16 } },

      ),
      React.createElement("p", { style: { marginBottom: 16 } },
        "The Agency Spectrum is a companion framework that extends this thinking into the agentic era. It builds on Lee, Sarkar, Tankelevitch, and colleagues' concept of \"task stewardship\" (2025), which describes the shift from task execution to task oversight as AI takes on more knowledge work. Jared Colley's work surfacing task stewardship for educators was a key influence."
      ),
      React.createElement("p", { style: { marginBottom: 0 } },
        "The three-role model (Executor, Director, Steward) and the walkthrough simulation are original contributions by Kevin Farrant, designed to make these ideas practical for classroom teachers navigating a rapidly changing landscape."
      ),
    ),

    // Sources
    React.createElement("div", {
      style: {
        padding: "16px 20px", borderRadius: 8, background: t.cardBg, border: t.cardBorder,
      }
    },
      React.createElement("div", {

        style: { fontSize: isMobile ? 13 : 14, color: t.textMid, lineHeight: 1.8 }

        React.createElement("p", { style: { margin: "0 0 4px 0" } }, "Perkins, M., Furze, L., Roe, J., & MacVaugh, J. The AI Assessment Scale."),
        React.createElement("p", { style: { margin: "0 0 4px 0" } }, "Lee, B., Sarkar, A., Tankelevitch, L., Drosos, I., Rintel, S., Banks, R., & Wilson, A. (2025). Task stewardship and the impact of generative AI on critical thinking."),
        React.createElement("p", { style: { margin: "0 0 4px 0" } }, "Colley, J. Task stewardship in educational contexts."),
        React.createElement("p", { style: { margin: 0 } }, "Farrant, K. (2026). The Agency Spectrum: A framework for teaching in the agentic era."),
      ),
    ),
  );
}

/* ───────── App ───────── */
function App() {
  const [dark, setDark] = useState(() => {
    if (typeof window !== "undefined") {
      const saved = localStorage.getItem("agency-theme");
      if (saved) return saved === "dark";
      return window.matchMedia("(prefers-color-scheme: dark)").matches;
    }
    return true;
  });
  const t = useTheme(dark);
  const isMobile = useIsMobile();

  useEffect(() => {
    document.body.style.background = t.bg;
    document.body.style.color = t.text;
    localStorage.setItem("agency-theme", dark ? "dark" : "light");
  }, [dark, t]);

  return React.createElement("div", {
    style: {
      maxWidth: 1100, margin: "0 auto",
      padding: isMobile ? "24px 16px" : "48px 32px",
      transition: "background 0.5s, color 0.5s",
    }
  },
    // Header
    React.createElement("header", {
      style: { marginBottom: isMobile ? 40 : 64 }
    },
      // Top bar: back link + theme toggle
      React.createElement("div", {
        style: { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 24 }
      },
        React.createElement("a", {
          href: "/",
          style: {
            fontSize: 11, fontFamily: mono, textTransform: "uppercase",
            letterSpacing: "0.1em", color: t.textLow, textDecoration: "none",
            transition: "color 0.3s",
          },
          onMouseEnter: (e) => e.target.style.color = t.accent,
          onMouseLeave: (e) => e.target.style.color = t.textLow,
        }, "\u2190 The AI Friction Scale"),
        React.createElement("button", {
          onClick: () => setDark(d => !d),
          style: {
            background: "transparent", border: "none", fontSize: 18,
            cursor: "pointer", padding: 4,
          },
          "aria-label": dark ? "Switch to light mode" : "Switch to dark mode",
        }, dark ? "\u2600\uFE0F" : "\uD83C\uDF19"),
      ),

      // Title
      React.createElement("div", {
        style: { fontSize: 10, fontFamily: mono, textTransform: "uppercase", letterSpacing: "0.15em", color: t.textFaint, marginBottom: 8 }
      }, "A Companion Framework"),
      React.createElement("h1", {
        style: {
          fontSize: isMobile ? 32 : 52, fontWeight: 300, lineHeight: 1.1,
          marginBottom: 16, color: t.text, letterSpacing: "-0.01em",
        }
      }, "The Agency Spectrum"),
      React.createElement("p", {
        style: {
          fontSize: isMobile ? 18 : 22, fontWeight: 300, color: t.textHigh,
          lineHeight: 1.6, maxWidth: 640,
        }
      }, "When AI can do the work, what should students learn? A framework for teaching in the agentic era."),
    ),

    // Sections
    React.createElement(WhatChanged, { t, isMobile }),
    React.createElement(AgencySpectrum, { t, isMobile }),
    React.createElement(WalkThrough, { t, isMobile }),
    React.createElement(Attribution, { t, isMobile }),

    // Footer
    React.createElement("footer", {
      style: { textAlign: "center", marginTop: isMobile ? 28 : 48, paddingBottom: 24 }
    },
      React.createElement("div", {
        style: {
          fontSize: 9, color: t.textGhost, fontFamily: mono,
          letterSpacing: "0.1em", textTransform: "uppercase", lineHeight: 1.8,
        }
      },
        "The Agency Spectrum (2026)",
        React.createElement("br"),
        "A companion to Jane Beckwith's AI Friction Scale",
        React.createElement("br"),
        "By ",
        React.createElement("a", {
          href: "mailto:kevinfarrant@gmail.com",
          style: { color: "inherit", textDecoration: "underline", textUnderlineOffset: "3px" }
        }, "Kevin Farrant"),
      ),
    ),
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
